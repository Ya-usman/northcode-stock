<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Hors connexion — StockShop</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
      background: #f4f6fb;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 32px 20px 16px;
    }
    .logo-wrap {
      background: #fff;
      border-radius: 12px;
      padding: 8px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.10);
    }
    .logo-wrap img { display: block; width: 36px; height: 36px; }
    .app-name { font-size: 16px; font-weight: 700; color: #111827; }
    .status {
      display: flex; align-items: center; gap: 5px;
      font-size: 12px; font-weight: 600; color: #ef4444; margin-top: 2px;
    }
    .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #ef4444; display: inline-block;
    }
    .retry-btn {
      margin-left: auto;
      display: flex; align-items: center; gap: 5px;
      background: #fff; border: 1px solid #e5e7eb;
      border-radius: 8px; padding: 7px 12px;
      font-size: 12px; font-weight: 500; color: #6b7280;
      cursor: pointer;
    }
    .retry-btn:active { background: #f3f4f6; }
    .retry-icon { font-size: 13px; }

    /* Banner */
    .banner {
      margin: 0 20px 24px;
      background: #fffbeb;
      border: 1px solid #fde68a;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 13px;
      color: #92400e;
      line-height: 1.5;
    }

    /* Nav grid */
    .grid {
      padding: 0 20px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      flex: 1;
    }
    .card {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 10px;
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 20px 10px;
      cursor: pointer;
      transition: transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .card:active { transform: scale(0.96); background: #f9fafb; }
    .icon-wrap {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: #eff6ff;
      display: flex; align-items: center; justify-content: center;
    }
    .icon { font-size: 18px; }
    .label {
      font-size: 13px; font-weight: 500;
      color: #1f2937; text-align: center; line-height: 1.3;
    }

    .footer {
      text-align: center;
      font-size: 11px;
      color: #9ca3af;
      padding: 20px;
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="logo-wrap">
      <img src="file:///android_asset/public/logo-offline.png"
           onerror="this.style.display='none'"
           alt="StockShop" />
    </div>
    <div>
      <div class="app-name">StockShop</div>
      <div class="status"><span class="dot"></span>Hors connexion</div>
    </div>
    <button class="retry-btn" onclick="retry()">
      <span class="retry-icon">↺</span> Réessayer
    </button>
  </div>

  <div class="banner">
    Pas de connexion Internet. Les pages que vous avez déjà visitées sont disponibles ci-dessous.
  </div>

  <div class="grid">
    <div class="card" onclick="go('dashboard')">
      <div class="icon-wrap"><span class="icon">📊</span></div>
      <div class="label">Tableau de bord</div>
    </div>
    <div class="card" onclick="go('sales/new')">
      <div class="icon-wrap"><span class="icon">🛒</span></div>
      <div class="label">Nouvelle vente</div>
    </div>
    <div class="card" onclick="go('stock')">
      <div class="icon-wrap"><span class="icon">📦</span></div>
      <div class="label">Stock</div>
    </div>
    <div class="card" onclick="go('customers')">
      <div class="icon-wrap"><span class="icon">👥</span></div>
      <div class="label">Clients</div>
    </div>
    <div class="card" onclick="go('expenses')">
      <div class="icon-wrap"><span class="icon">🧾</span></div>
      <div class="label">Dépenses</div>
    </div>
    <div class="card" onclick="go('reports')">
      <div class="icon-wrap"><span class="icon">📈</span></div>
      <div class="label">Rapports</div>
    </div>
  </div>

  <div class="footer">Les données affichées proviennent du cache local</div>

  <script>
    var BASE = 'https://stockshop.tech';

    function getLocale() {
      try {
        // Try to get locale from a cookie passed via document
        var m = document.cookie.match(/NEXT_LOCALE=([^;]+)/);
        if (m) return m[1];
      } catch(e) {}
      return 'fr';
    }

    function go(route) {
      window.location.href = BASE + '/' + getLocale() + '/' + route;
    }

    function retry() {
      window.location.href = BASE;
    }

    // Auto-redirect when back online
    window.addEventListener('online', function() {
      window.location.href = BASE;
    });
  </script>
</body>
</html>
