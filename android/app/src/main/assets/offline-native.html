<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Hors connexion — StockShop</title>
  <style>
    /* ── Palette light (= app globals.css :root) ── */
    :root {
      --bg:          #ffffff;
      --bg-page:     #f1f5f9;
      --card:        #ffffff;
      --border:      #dde6f0;
      --border-sub:  #eef2f7;
      --fg:          #0c1322;
      --fg-muted:    #64748b;
      --fg-strong:   #1e293b;
      --icon-bg:     #dbeafe;
      --pending-fg:  #92400e;
      /* retry btn */
      --retry-bg:    #073e8a;
      --retry-fg:    #ffffff;
      --retry-border: #073e8a;
      /* no-data info row */
      --info-bg:     #eff6ff;
      --info-border: #bfdbfe;
      --info-fg:     #1d4ed8;
    }

    /* ── Palette dark (= app globals.css .dark, navy-blue base) ── */
    @media (prefers-color-scheme: dark) {
      :root {
        --bg:          #091524;
        --bg-page:     #091524;
        --card:        #101e30;
        --border:      #263040;
        --border-sub:  #1a2a3c;
        --fg:          #f0f0f0;
        --fg-muted:    #8a9ab0;
        --fg-strong:   #e2eaf4;
        --icon-bg:     #0f2d50;
        --pending-fg:  #fbbf24;
        /* retry btn — outlined style en dark */
        --retry-bg:    transparent;
        --retry-fg:    #93c5fd;
        --retry-border: #263040;
        /* no-data info row */
        --info-bg:     #0f2240;
        --info-border: #1e3a5f;
        --info-fg:     #93c5fd;
      }
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
      background: var(--bg-page);
      color: var(--fg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 32px 20px 12px;
    }
    .brand { display: flex; flex-direction: column; gap: 4px; }
    .brand-row { display: flex; align-items: center; gap: 8px; }
    .brand-logo { width: 32px; height: 32px; object-fit: contain; display: block; }
    .brand-name { font-size: 16px; font-weight: 700; color: var(--fg); }
    .status { display: flex; align-items: center; gap: 5px; margin-left: 2px; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #ef4444; }
    .status-text { font-size: 12px; font-weight: 600; color: #ef4444; }

    .retry-btn {
      display: flex; align-items: center; gap: 5px;
      background: var(--retry-bg);
      border: 1px solid var(--retry-border);
      border-radius: 10px; padding: 8px 14px;
      font-size: 12px; font-weight: 600;
      color: var(--retry-fg);
      cursor: pointer;
      transition: opacity .15s;
    }
    .retry-btn:active { opacity: 0.7; }

    /* Status bar */
    .status-bar {
      margin: 8px 20px 16px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
    }
    .status-row {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 16px;
      font-size: 12px;
      color: var(--fg-muted);
      border-bottom: 1px solid var(--border-sub);
    }
    .status-row:last-child { border-bottom: none; }
    .status-row .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--border); flex-shrink: 0; }
    .status-row .dot.amber { background: #f59e0b; }
    .status-row strong { color: var(--fg-strong); }
    .status-row.pending { color: var(--pending-fg); }

    .info-row {
      display: flex; align-items: center; gap: 10px;
      padding: 11px 16px;
      font-size: 12px; font-weight: 500;
      color: var(--info-fg);
      background: var(--info-bg);
      border: 1px solid var(--info-border);
      border-radius: 14px;
      margin: 8px 20px 16px;
    }
    .info-row .info-icon { font-size: 14px; flex-shrink: 0; }

    /* Primary CTA */
    .primary-cta {
      margin: 0 20px 12px;
      display: flex; align-items: center; gap: 16px;
      background: #073e8a;
      border-radius: 16px;
      padding: 16px 20px;
      cursor: pointer;
      border: none;
      width: calc(100% - 40px);
      text-align: left;
      box-shadow: 0 4px 16px rgba(7,62,138,.35);
      transition: opacity .15s, transform .1s;
    }
    .primary-cta:active { transform: scale(0.98); opacity: .9; }
    .cta-icon {
      width: 48px; height: 48px; flex-shrink: 0;
      background: rgba(255,255,255,0.15);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
    }
    .cta-title { font-size: 16px; font-weight: 700; color: #fff; }
    .cta-sub { font-size: 12px; color: #93c5fd; margin-top: 2px; }

    /* Grid */
    .grid {
      padding: 0 20px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      flex: 1;
    }
    .card {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 10px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px 10px;
      cursor: pointer;
      transition: opacity .15s, transform .1s;
    }
    .card:active { transform: scale(0.96); opacity: .8; }
    .card-icon {
      width: 42px; height: 42px;
      border-radius: 50%;
      background: var(--icon-bg);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    .card-label {
      font-size: 13px; font-weight: 600;
      color: var(--fg); text-align: center; line-height: 1.3;
    }

    .footer {
      text-align: center;
      font-size: 11px;
      color: var(--fg-muted);
      padding: 20px;
    }

    @media (prefers-color-scheme: dark) {
      .brand-logo { filter: brightness(0) invert(1); }
      .primary-cta { background: #1a4fa8; box-shadow: 0 4px 20px rgba(26,79,168,.4); }
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="brand">
      <div class="brand-row">
        <img class="brand-logo"
             src="file:///android_asset/public/logo-icon-t.png"
             onerror="this.style.display='none'"
             alt="StockShop" />
        <span class="brand-name">StockShop</span>
      </div>
      <div class="status">
        <span class="status-dot"></span>
        <span class="status-text">Hors connexion</span>
      </div>
    </div>
    <button class="retry-btn" onclick="retry()">↺ Réessayer</button>
  </div>

  <div class="status-bar" id="statusBar">
    <div class="status-row" id="syncRow" style="display:none">
      <div class="dot"></div>
      <span>Données synchronisées <strong id="syncTime"></strong></span>
    </div>
    <div class="status-row pending" id="pendingRow" style="display:none">
      <div class="dot amber"></div>
      <strong id="pendingText"></strong>
    </div>
  </div>

  <div class="info-row" id="noDataRow">
    <span class="info-icon">ℹ️</span>
    <span>Connectez-vous en ligne pour charger les données</span>
  </div>

  <button class="primary-cta" onclick="go('sales/new')">
    <div class="cta-icon">🛒</div>
    <div>
      <div class="cta-title">Nouvelle vente</div>
      <div class="cta-sub">Enregistrée localement si hors ligne</div>
    </div>
  </button>

  <div class="grid">
    <button class="card" onclick="go('dashboard')">
      <div class="card-icon">📊</div>
      <div class="card-label">Tableau de bord</div>
    </button>
    <button class="card" onclick="go('stock')">
      <div class="card-icon">📦</div>
      <div class="card-label">Stock</div>
    </button>
    <button class="card" onclick="go('customers')">
      <div class="card-icon">👥</div>
      <div class="card-label">Clients</div>
    </button>
    <button class="card" onclick="go('payments')">
      <div class="card-icon">💰</div>
      <div class="card-label">Dette</div>
    </button>
    <button class="card" onclick="go('expenses')">
      <div class="card-icon">🧾</div>
      <div class="card-label">Dépenses</div>
    </button>
    <button class="card" onclick="go('reports')">
      <div class="card-icon">📈</div>
      <div class="card-label">Rapports</div>
    </button>
  </div>

  <div class="footer">Les données affichées proviennent du cache local</div>

  <script>
    var BASE = 'https://stockshop.tech';

    function getLocale() {
      try {
        var m = document.cookie.match(/NEXT_LOCALE=([^;]+)/);
        if (m) return m[1];
        return localStorage.getItem('NEXT_LOCALE') || 'fr';
      } catch(e) { return 'fr'; }
    }

    function go(route) {
      window.location.href = BASE + '/' + getLocale() + '/' + route;
    }

    function retry() {
      var btn = document.querySelector('.retry-btn');
      btn.textContent = '⏳ Vérification…';
      fetch(BASE + '/api/health', { method: 'HEAD', cache: 'no-store' })
        .then(function(r) {
          if (r.ok) { window.location.href = BASE; }
          else { btn.textContent = '↺ Réessayer'; }
        })
        .catch(function() { btn.textContent = '↺ Réessayer'; });
    }

    // Afficher la dernière sync depuis localStorage
    function showSyncStatus() {
      try {
        var keys = Object.keys(localStorage).filter(function(k) { return k.startsWith('pc_data_'); });
        if (keys.length) {
          var ts = Math.max.apply(null, keys.map(function(k) { return Number(localStorage.getItem(k)) || 0; }));
          if (ts > 0) {
            var d = new Date(ts);
            var diff = Date.now() - ts;
            var min = Math.floor(diff / 60000);
            var h = Math.floor(diff / 3600000);
            var label = min < 1 ? "à l'instant"
              : min < 60 ? 'il y a ' + min + ' min'
              : "aujourd'hui à " + d.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
            document.getElementById('syncTime').textContent = label;
            document.getElementById('syncRow').style.display = 'flex';
            document.getElementById('noDataRow').style.display = 'none';
          }
        }
      } catch(e) {}
    }

    showSyncStatus();
    // Cacher la status-bar si elle est vide (aucune ligne visible)
    var bar = document.getElementById('statusBar');
    if (bar) {
      var rows = bar.querySelectorAll('.status-row');
      var anyVisible = false;
      rows.forEach(function(r) { if (r.style.display !== 'none') anyVisible = true; });
      if (!anyVisible) bar.style.display = 'none';
    }

    window.addEventListener('online', function() {
      fetch(BASE + '/api/health', { method: 'HEAD', cache: 'no-store' })
        .then(function(r) { if (r.ok) window.location.href = BASE; })
        .catch(function() {});
    });
  </script>
</body>
</html>
