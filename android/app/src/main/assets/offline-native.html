<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Hors connexion — StockShop</title>
  <style>
    :root {
      --bg-page:     #f1f5f9;
      --fg:          #0c1322;
      --fg-muted:    #64748b;
      --retry-bg:    #073e8a;
      --retry-fg:    #ffffff;
      --retry-border: #073e8a;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg-page:     #091524;
        --fg:          #f0f0f0;
        --fg-muted:    #8a9ab0;
        --retry-bg:    transparent;
        --retry-fg:    #93c5fd;
        --retry-border: #263040;
      }
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
      background: var(--bg-page);
      color: var(--fg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 32px 20px 12px;
    }
    .brand { display: flex; flex-direction: column; gap: 4px; }
    .brand-row { display: flex; align-items: center; gap: 8px; }
    .brand-logo { width: 32px; height: 32px; object-fit: contain; display: block; }
    .brand-name { font-size: 16px; font-weight: 700; color: var(--fg); }
    .status { display: flex; align-items: center; gap: 5px; margin-left: 2px; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #ef4444; }
    .status-text { font-size: 12px; font-weight: 600; color: #ef4444; }

    .retry-btn {
      display: flex; align-items: center; gap: 5px;
      background: var(--retry-bg);
      border: 1px solid var(--retry-border);
      border-radius: 10px; padding: 8px 14px;
      font-size: 12px; font-weight: 600;
      color: var(--retry-fg);
      cursor: pointer;
      transition: opacity .15s;
    }
    .retry-btn:active { opacity: 0.7; }

    .footer {
      text-align: center;
      font-size: 11px;
      color: var(--fg-muted);
      padding: 20px;
    }

    .offline-message {
      flex: 1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 0 32px 40px;
      text-align: center;
      gap: 12px;
    }
    .offline-icon { font-size: 48px; }
    .offline-title {
      font-size: 18px; font-weight: 700;
      color: var(--fg);
    }
    .offline-desc {
      font-size: 14px; color: var(--fg-muted); line-height: 1.5;
    }
    .offline-desc-alt {
      font-size: 13px; color: #22c55e; font-weight: 500;
    }

    @media (prefers-color-scheme: dark) {
      .brand-logo { filter: brightness(0) invert(1); }
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="brand">
      <div class="brand-row">
        <img class="brand-logo"
             src="file:///android_asset/public/logo-icon-t.png"
             onerror="this.style.display='none'"
             alt="StockShop" />
        <span class="brand-name">StockShop</span>
      </div>
      <div class="status">
        <span class="status-dot"></span>
        <span class="status-text">Hors connexion</span>
      </div>
    </div>
    <button class="retry-btn" onclick="retry()">↺ Réessayer</button>
  </div>

  <div class="offline-message">
    <div class="offline-icon">📵</div>
    <p class="offline-title" id="mainTitle">Hors connexion</p>
    <p class="offline-desc" id="mainDesc">
      Cette page n'est pas disponible sans connexion.
      Revenez en arrière ou reconnectez-vous.
    </p>
    <p class="offline-desc-alt" id="hasCacheMsg" style="display:none">
      Vos données sont en cache. Utilisez le bouton Retour pour continuer.
    </p>
    <button class="retry-btn" onclick="history.back()" style="margin-top:8px;background:#334155;border-color:#334155">← Retour</button>
  </div>

  <div class="footer">StockShop · Mode hors ligne</div>

  <script>
    var BASE = 'https://stockshop.tech';

    function retry() {
      var btn = document.querySelector('.retry-btn');
      btn.textContent = '⏳ Vérification…';
      fetch(BASE + '/api/health', { method: 'HEAD', cache: 'no-store' })
        .then(function(r) {
          if (r.ok) { window.location.href = BASE; }
          else { btn.textContent = '↺ Réessayer'; }
        })
        .catch(function() { btn.textContent = '↺ Réessayer'; });
    }

    // Depuis file:// on n'a pas accès au localStorage de stockshop.tech —
    // on adapte le message selon qu'on détecte une session active via cookies.
    try {
      var hasCookie = document.cookie.indexOf('sb-') !== -1 || document.cookie.indexOf('NEXT_LOCALE') !== -1;
      if (!hasCookie) {
        // Probablement cold start sans session connue
        document.getElementById('mainTitle').textContent = 'Démarrage hors ligne';
        document.getElementById('mainDesc').textContent =
          'Ouvrez l\'application en ligne au moins une fois pour activer le mode hors ligne complet.';
        document.querySelector('[onclick="history.back()"]').style.display = 'none';
      } else {
        document.getElementById('hasCacheMsg').style.display = 'block';
      }
    } catch(e) {}

    // Rediriger automatiquement dès que la connexion revient
    window.addEventListener('online', function() {
      fetch(BASE + '/api/health', { method: 'HEAD', cache: 'no-store' })
        .then(function(r) { if (r.ok) window.location.href = BASE; })
        .catch(function() {});
    });
  </script>
</body>
</html>
