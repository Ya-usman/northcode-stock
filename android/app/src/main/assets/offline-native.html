<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Hors connexion — StockShop</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
      background: #f4f6fb;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 32px 20px 12px;
    }
    .brand { display: flex; flex-direction: column; gap: 4px; }
    .brand-row { display: flex; align-items: center; gap: 8px; }
    .brand-logo { width: 32px; height: 32px; object-fit: contain; display: block; }
    .brand-name { font-size: 16px; font-weight: 700; color: #111827; }
    .status { display: flex; align-items: center; gap: 5px; margin-left: 2px; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #ef4444; }
    .status-text { font-size: 12px; font-weight: 600; color: #ef4444; }
    .retry-btn {
      display: flex; align-items: center; gap: 5px;
      background: #fff; border: 1px solid #e5e7eb;
      border-radius: 8px; padding: 8px 12px;
      font-size: 12px; font-weight: 500; color: #6b7280;
      cursor: pointer;
    }
    .retry-btn:active { background: #f3f4f6; }

    /* Status bar */
    .status-bar {
      margin: 8px 20px 20px;
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      overflow: hidden;
    }
    .status-row {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 16px;
      font-size: 12px; color: #6b7280;
      border-bottom: 1px solid #f3f4f6;
    }
    .status-row:last-child { border-bottom: none; }
    .status-row .dot { width: 6px; height: 6px; border-radius: 50%; background: #d1d5db; flex-shrink: 0; }
    .status-row .dot.amber { background: #f59e0b; }
    .status-row strong { color: #374151; }
    .status-row.pending { color: #92400e; }

    /* Primary CTA */
    .primary-cta {
      margin: 0 20px 12px;
      display: flex; align-items: center; gap: 16px;
      background: #073e8a;
      border-radius: 16px;
      padding: 16px 20px;
      cursor: pointer;
      border: none;
      width: calc(100% - 40px);
      text-align: left;
    }
    .primary-cta:active { transform: scale(0.98); }
    .cta-icon {
      width: 48px; height: 48px; flex-shrink: 0;
      background: rgba(255,255,255,0.15);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
    }
    .cta-title { font-size: 16px; font-weight: 700; color: #fff; }
    .cta-sub { font-size: 12px; color: #93c5fd; margin-top: 2px; }

    /* Grid */
    .grid {
      padding: 0 20px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      flex: 1;
    }
    .card {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 10px;
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 18px 10px;
      cursor: pointer;
      border: none;
    }
    .card:active { transform: scale(0.96); background: #f9fafb; }
    .card-icon {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: #eff6ff;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    .card-label {
      font-size: 13px; font-weight: 500;
      color: #1f2937; text-align: center; line-height: 1.3;
    }

    .footer {
      text-align: center;
      font-size: 11px;
      color: #9ca3af;
      padding: 20px;
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="brand">
      <div class="brand-row">
        <img class="brand-logo"
             src="file:///android_asset/public/logo-icon-t.png"
             onerror="this.style.display='none'"
             alt="StockShop" />
        <span class="brand-name">StockShop</span>
      </div>
      <div class="status">
        <span class="status-dot"></span>
        <span class="status-text">Hors connexion</span>
      </div>
    </div>
    <button class="retry-btn" onclick="retry()">↺ Réessayer</button>
  </div>

  <div class="status-bar" id="statusBar">
    <div class="status-row" id="syncRow" style="display:none">
      <div class="dot"></div>
      <span>Données synchronisées <strong id="syncTime"></strong></span>
    </div>
    <div class="status-row pending" id="pendingRow" style="display:none">
      <div class="dot amber"></div>
      <strong id="pendingText"></strong>
    </div>
    <div class="status-row" id="noDataRow">
      <div class="dot"></div>
      <span>Connectez-vous en ligne pour charger les données</span>
    </div>
  </div>

  <button class="primary-cta" onclick="go('sales/new')">
    <div class="cta-icon">🛒</div>
    <div>
      <div class="cta-title">Nouvelle vente</div>
      <div class="cta-sub">Enregistrée localement si hors ligne</div>
    </div>
  </button>

  <div class="grid">
    <button class="card" onclick="go('dashboard')">
      <div class="card-icon">📊</div>
      <div class="card-label">Tableau de bord</div>
    </button>
    <button class="card" onclick="go('stock')">
      <div class="card-icon">📦</div>
      <div class="card-label">Stock</div>
    </button>
    <button class="card" onclick="go('customers')">
      <div class="card-icon">👥</div>
      <div class="card-label">Clients</div>
    </button>
    <button class="card" onclick="go('payments')">
      <div class="card-icon">💰</div>
      <div class="card-label">Dette</div>
    </button>
    <button class="card" onclick="go('expenses')">
      <div class="card-icon">🧾</div>
      <div class="card-label">Dépenses</div>
    </button>
    <button class="card" onclick="go('reports')">
      <div class="card-icon">📈</div>
      <div class="card-label">Rapports</div>
    </button>
  </div>

  <div class="footer">Les données affichées proviennent du cache local</div>

  <script>
    var BASE = 'https://stockshop.tech';

    function getLocale() {
      try {
        var m = document.cookie.match(/NEXT_LOCALE=([^;]+)/);
        if (m) return m[1];
        return localStorage.getItem('NEXT_LOCALE') || 'fr';
      } catch(e) { return 'fr'; }
    }

    function go(route) {
      window.location.href = BASE + '/' + getLocale() + '/' + route;
    }

    function retry() {
      var btn = document.querySelector('.retry-btn');
      btn.textContent = '⏳ Vérification…';
      fetch(BASE + '/api/health', { method: 'HEAD', cache: 'no-store' })
        .then(function(r) {
          if (r.ok) { window.location.href = BASE; }
          else { btn.textContent = '↺ Réessayer'; }
        })
        .catch(function() { btn.textContent = '↺ Réessayer'; });
    }

    // Afficher la dernière sync depuis localStorage
    function showSyncStatus() {
      try {
        var keys = Object.keys(localStorage).filter(function(k) { return k.startsWith('pc_data_'); });
        if (keys.length) {
          var ts = Math.max.apply(null, keys.map(function(k) { return Number(localStorage.getItem(k)) || 0; }));
          if (ts > 0) {
            var d = new Date(ts);
            var diff = Date.now() - ts;
            var min = Math.floor(diff / 60000);
            var h = Math.floor(diff / 3600000);
            var label = min < 1 ? "à l'instant"
              : min < 60 ? 'il y a ' + min + ' min'
              : "aujourd'hui à " + d.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
            document.getElementById('syncTime').textContent = label;
            document.getElementById('syncRow').style.display = 'flex';
            document.getElementById('noDataRow').style.display = 'none';
          }
        }
      } catch(e) {}
    }

    showSyncStatus();

    window.addEventListener('online', function() {
      fetch(BASE + '/api/health', { method: 'HEAD', cache: 'no-store' })
        .then(function(r) { if (r.ok) window.location.href = BASE; })
        .catch(function() {});
    });
  </script>
</body>
</html>
